<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fitrah Connect | Silaturahmi AI Personal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&family=Playfair+Display:ital,wght@0,600;1,600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #fcfcfb; }
        h1, h2 { font-family: 'Playfair Display', serif; }
        .bg-sage-dark { background-color: #4f6f52; } 
        .text-sage-dark { color: #4f6f52; }
        .text-gold-main { color: #D4AF37; }
        .border-gold-main { border-color: #D4AF37; }
        .bg-gold-soft { background-color: #fdf8e6; } 
        .loading { animation: pulse 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
        
        textarea::-webkit-scrollbar { width: 8px; }
        textarea::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 4px; }
        textarea::-webkit-scrollbar-thumb { background: #4f6f52; border-radius: 4px; }
    </style>
</head>
<body class="text-slate-800 pb-20 selection:bg-[#4f6f52] selection:text-white">

    <!-- Header Section -->
    <header class="bg-sage-dark text-white py-16 px-6 text-center shadow-lg border-b-4 border-gold-main relative overflow-hidden">
        <div class="absolute top-0 left-0 w-full h-full opacity-10 pointer-events-none" style="background-image: url('data:image/svg+xml,%3Csvg width=\'60\' height=\'60\' viewBox=\'0 0 60 60\' xmlns=\'http://www.w3.org/2000/svg\'%3E%3Cg fill=\'none\' fill-rule=\'evenodd\'%3E%3Cg fill=\'#ffffff\' fill-opacity=\'1\'%3E%3Cpath d=\'M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z\'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E');"></div>
        
        <div class="max-w-3xl mx-auto text-center flex flex-col items-center relative z-10">
            <span class="bg-white px-5 py-1.5 rounded-full text-[10px] font-bold uppercase tracking-[0.2em] mb-4 inline-block text-sage-dark shadow-sm">
                Edisi Ramadhan & Idul Fitri
            </span>
            <h1 class="text-4xl md:text-5xl font-bold mb-3 text-white">Fitrah Connect</h1>
            <p class="text-white/90 text-lg md:text-xl italic font-light">"Menyambung Rasa, Menjaga Adab, Meraih Fitrah."</p>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-2xl mx-auto -mt-8 px-4 sm:px-6 relative z-20">
        <div class="bg-white rounded-3xl p-6 md:p-8 shadow-2xl border border-slate-100 text-center">
            
            <div id="notificationBox" class="hidden mb-6 p-4 rounded-xl text-sm font-semibold transition-all duration-300"></div>

            <div class="bg-gold-soft rounded-2xl p-5 md:p-6 mb-8 border border-gold-main/30 text-left">
                <div class="mb-5">
                    <label class="block text-sm font-bold text-sage-dark mb-2">1. Siapa Penerimanya?</label>
                    <input type="text" id="recipientName" placeholder="Contoh: Pak Budi (Mantan Atasan)" class="w-full p-3.5 rounded-xl bg-white border border-slate-200 focus:ring-2 focus:ring-[#4f6f52] outline-none transition shadow-sm text-sm">
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-5 mb-5">
                    <div>
                        <label class="block text-sm font-bold text-sage-dark mb-2">2. Pilih Suasana</label>
                        <select id="mood" class="w-full p-3.5 rounded-xl bg-white border border-slate-200 outline-none focus:ring-2 focus:ring-[#4f6f52] shadow-sm text-sm">
                            <option value="Sopan, formal, dan penuh hormat">Sopan & Baku</option>
                            <option value="Akrab, santai seperti sahabat, gunakan bahasa sehari-hari">Akrab & Santai</option>
                            <option value="Profesional, ringkas, namun tetap hangat">Formal Profesional</option>
                            <option value="Puitis, menyentuh hati, dan indah">Unik & Puitis</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-sage-dark mb-2">3. Pilih Bahasa</label>
                        <select id="language" class="w-full p-3.5 rounded-xl bg-white border border-slate-200 outline-none focus:ring-2 focus:ring-[#4f6f52] shadow-sm text-sm">
                            <option value="Bahasa Indonesia">Bahasa Indonesia</option>
                            <option value="Bahasa Jawa (Krama Alus)">Bahasa Jawa (Krama)</option>
                            <option value="Bahasa Sunda (Lemes)">Bahasa Sunda</option>
                            <option value="English">Bahasa Inggris</option>
                        </select>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-bold text-sage-dark mb-2">
                        4. Cerita Spesial Kamu Dengannya <span class="text-[10px] font-normal text-slate-500 uppercase ml-1">(Opsional)</span>
                    </label>
                    <textarea id="context" placeholder="Misal: Ingat saat beliau bantu project pertama saya..." class="w-full p-3.5 rounded-xl bg-white border border-slate-200 h-24 focus:ring-2 focus:ring-[#4f6f52] outline-none transition shadow-sm text-sm resize-none"></textarea>
                </div>
            </div>

            <button onclick="generateMessage()" id="btnAction" class="w-full bg-sage-dark text-white font-bold py-4 rounded-2xl transition shadow-lg flex items-center justify-center gap-2 hover:bg-slate-800 active:scale-95 transform">
                <span id="btnText">✨ Rangkai Pesan Tulus</span>
            </button>

            <div id="resultContainer" class="hidden mt-10 pt-8 border-t-2 border-dashed border-slate-200">
                <div id="outputMessage" class="bg-white p-6 rounded-2xl border-2 border-gold-main text-slate-700 leading-relaxed text-left text-sm md:text-base shadow-inner whitespace-pre-wrap mb-5"></div>
                <div class="grid grid-cols-2 gap-3">
                    <button onclick="copyText()" class="bg-slate-800 text-white py-3.5 rounded-xl text-sm font-bold shadow hover:bg-slate-700 transition">Salin Teks</button>
                    <a id="waLink" target="_blank" class="border-2 border-sage-dark text-sage-dark py-3.5 rounded-xl text-sm font-bold hover:bg-sage-dark hover:text-white transition flex items-center justify-center">Kirim WA</a>
                </div>
            </div>
        </div>

        <div class="text-center mt-10 text-xs font-semibold text-slate-400">
            © 2026 Developed by Tenia Novalia - Built with Agentic AI
        </div>
    </main>

    <script>
        const MY_API_KEY = "AIzaSyCCRP_2eBbf2SDcdVuwnbjIGEFlKpSWcjY";

        function showNotification(message, type = 'error') {
            const box = document.getElementById('notificationBox');
            box.innerText = message;
            box.className = `mb-6 p-4 rounded-xl text-sm font-semibold transition-all duration-300 block ${type === 'error' ? 'bg-red-50 text-red-600 border border-red-200' : 'bg-green-50 text-green-700 border border-green-200'}`;
            if(type === 'error') box.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }

        async function generateMessage() {
            const name = document.getElementById('recipientName').value.trim();
            const context = document.getElementById('context').value.trim();
            const mood = document.getElementById('mood').value;
            const lang = document.getElementById('language').value;
            
            const btn = document.getElementById('btnAction');
            const btnText = document.getElementById('btnText');
            const resultContainer = document.getElementById('resultContainer');

            if (!name) {
                showNotification("Tenia, isi dulu nama penerimanya ya!", "error");
                return;
            }

            btn.disabled = true;
            btnText.innerText = "Sedang Merangkai...";
            resultContainer.classList.add('hidden');
            document.getElementById('notificationBox').classList.add('hidden');

            const prompt = `Tuliskan satu ucapan selamat Hari Raya Idul Fitri untuk ${name}. Suasana: ${mood}. Bahasa: ${lang}. ${context ? `Hubungkan dengan cerita: ${context}` : ''}. Langsung hasil ucapannya saja tanpa pengantar.`;

            try {
                // MENGGUNAKAN MODEL gemini-pro (Endpoint v1)
                const url = `https://generativelanguage.googleapis.com/v1/models/gemini-pro:generateContent?key=${MY_API_KEY}`;
                
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });

                const data = await response.json();

                if (data.error) {
                    throw new Error(data.error.message);
                }

                const result = data.candidates?.[0]?.content?.parts?.[0]?.text || "Maaf, gagal merangkai pesan.";
                document.getElementById('outputMessage').innerText = result;
                document.getElementById('waLink').href = `https://api.whatsapp.com/send?text=${encodeURIComponent(result)}`;
                
                resultContainer.classList.remove('hidden');
                setTimeout(() => resultContainer.scrollIntoView({ behavior: 'smooth', block: 'start' }), 100);
                showNotification("Berhasil dirangkai!", "success");

            } catch (err) {
                console.error(err);
                showNotification(`Percobaan Model Alternatif: ${err.message}. Tenia, coba klik sekali lagi atau pastikan API Key kamu tidak terbatasi.`, "error");
            } finally {
                btn.disabled = false;
                btnText.innerText = "✨ Rangkai Pesan Tulus";
            }
        }

        function copyText() {
            const text = document.getElementById('outputMessage').innerText;
            navigator.clipboard.writeText(text).then(() => {
                showNotification("Teks berhasil disalin!", "success");
            }).catch(() => {
                const el = document.createElement('textarea');
                el.value = text;
                document.body.appendChild(el);
                el.select();
                document.execCommand('copy');
                document.body.removeChild(el);
                showNotification("Teks berhasil disalin!", "success");
            });
        }
    </script>
</body>
</html>
